<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pengajuan Pembayaran V3</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:15px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    box-sizing:border-box;
    margin-top:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.btn-green{
    background:#2e7d32;
}

.btn-red{
    background:#c62828;
}

.item{
    border:1px solid #ddd;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    background:#fafafa;
}

.total{
    font-size:24px;
    font-weight:bold;
    text-align:center;
    color:#1976d2;
}

    .vendor-list{

    border:1px solid #ddd;
    background:white;

    max-height:150px;

    overflow-y:auto;

}
</style>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
</head>

<body>

<div class="card">

<h2>Header Pengajuan</h2>

<label>Jenis</label>
<select id="jenis">
    <option value="">Pilih Jenis</option>
    <option value="Permintaan">Permintaan</option>
    <option value="Reimburse">Reimburse</option>
</select>

<label>Klien</label>
<select id="klien">
    <option value="">Pilih Klien</option>
    <option value="KPI">KPI</option>
    <option value="KPB">KPB</option>
</select>

<label>Nama Pengaju</label>
<input id="nama_pengaju">

<label>Keperluan</label>
<textarea id="keperluan"></textarea>

<label>Nomor Rekening</label>
<input id="nomor_rekening">

<label>Nama Bank</label>
<label>Nama Bank</label>

<select
id="nama_bank"
onchange="toggleBankLain()">

    <option value="">
        Pilih Bank
    </option>

    <option value="MANDIRI">
        MANDIRI
    </option>

    <option value="BCA">
        BCA
    </option>

    <option value="BNI">
        BNI
    </option>

    <option value="BRI">
        BRI
    </option>

    <option value="CIMB NIAGA">
        CIMB NIAGA
    </option>

    <option value="BANK LAIN">
        BANK LAIN
    </option>

</select>

<div
id="bankLainDiv"
style="display:none">

<label>Nama Bank Lain</label>

<input
type="text"
id="bank_lain">

</div>

<label>Atas Nama</label>
<input id="atas_nama">

</div>

<div class="card">

<h2>Detail Pengajuan</h2>

<div id="detailContainer">

    <div id="kosong">
        Belum ada item pengajuan.<br>
        Klik tombol + Tambah Item
    </div>

</div>

<button
type="button"
class="btn-green"
onclick="tambahItem()">

+ Tambah Item

</button>

</div>

<div class="card">

<h2>Total Tagihan Vendor</h2>

<div class="total">

Rp <span id="grandTotal">0</span>

</div>

</div>

<div class="card">

<h2>Ringkasan Pengajuan</h2>

<label>Nominal Kesepakatan (Opsional)</label>
<input
type="number"
id="nominal_kesepakatan">

<label>Biaya Admin (Opsional)</label>
<input
type="number"
id="biaya_admin">

<button
type="button"
class="btn-green"
onclick="previewPengajuan()">

Preview Pengajuan

</button>

</div>

<div
class="card"
id="previewCard"
style="display:none">

<h2>Preview Pengajuan</h2>

<div id="previewData"></div>

</div>

<script>
const supabaseUrl =
"https://dwfkjlcmjnbhuieqkpkl.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3ZmtqbGNtam5iaHVpZXFrcGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjY3ODksImV4cCI6MjA5Nzk0Mjc4OX0.QjjXjImFkFpUWaAY-uMdX5gNi7k8xUl11YGlBe0CVsQ";

const supabase =
window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);
let counter = 0;

function tambahItem(){

    counter++;

    const kosong =
    document.getElementById("kosong");

    if(kosong){
    kosong.remove();
    }

    let container =
    document.getElementById(
        "detailContainer"
    );

    let div =
    document.createElement("div");

    div.className = "item";

    div.id = "item_" + counter;

    div.innerHTML = `
    
    <label>Tanggal Nota</label>
    <input type="date" class="tanggal_nota">

    <label>Vendor</label>

    <input
    type="text"
    class="vendor"
    onkeyup="cariVendor(this)"
    placeholder="Ketik nama vendor">

    <div class="vendor-list"></div>

    <label>Nama Barang</label>
    <input type="text" class="nama_barang">

    <label>Qty</label>
    <input type="number" class="qty">

    <label>Satuan</label>
    <input type="text" class="satuan">

    <label>Nominal Tagihan</label>
    <input
    type="number"
    class="nominal_tagihan"
    oninput="hitungTotal()">

    <label>Keterangan</label>
    <textarea class="keterangan"></textarea>

    <button
    type="button"
    class="btn-red"
    onclick="hapusItem(${counter})">

    Hapus Item

    </button>

    `;

    container.appendChild(div);

}

function hapusItem(id){

    let item =
    document.getElementById(
        "item_" + id
    );

    if(item){

        item.remove();

    }

    hitungTotal();

}

function hitungTotal(){

    let total = 0;

    let nominals =
    document.querySelectorAll(
        ".nominal_tagihan"
    );

    nominals.forEach(function(x){

        total +=
        Number(x.value || 0);

    });

    document.getElementById(
        "grandTotal"
    ).innerText =
    total.toLocaleString("id-ID");

}

    function cariVendor(input){

    const keyword =
    input.value
    .toLowerCase();

    const list =
    input.nextElementSibling;

    list.innerHTML = "";

    if(keyword.length < 2){

        return;

    }

    const dummyVendor = [

        "Pertamina Patra Niaga",
        "Pertamina Patra Logistik",
        "Pertamina Training Consulting",
        "Bareh Solok",
        "Indomaret",
        "Alfamart"

    ];

    const hasil =
    dummyVendor.filter(vendor =>
        vendor
        .toLowerCase()
        .includes(keyword)
    );

    hasil.forEach(vendor=>{

        const div =
        document.createElement("div");

        div.innerHTML = vendor;

        div.style.padding = "8px";
        div.style.cursor = "pointer";
        div.style.borderBottom =
        "1px solid #eee";

        div.onclick = function(){

            input.value = vendor;

            list.innerHTML = "";

        };

        list.appendChild(div);

    });

}

    function toggleBankLain(){

    const bank =
    document.getElementById(
        "nama_bank"
    ).value;

    if(bank==="BANK LAIN"){

        document
        .getElementById(
            "bankLainDiv"
        )
        .style.display =
        "block";

    }else{

        document
        .getElementById(
            "bankLainDiv"
        )
        .style.display =
        "none";

    }

}
function previewPengajuan(){

    const total =
    document.getElementById(
        "grandTotal"
    ).innerText;

    const kesepakatan =
    document.getElementById(
        "nominal_kesepakatan"
    ).value || 0;

    const admin =
    document.getElementById(
        "biaya_admin"
    ).value || 0;

    let html = `

    <p>
    <b>Total Tagihan Vendor :</b><br>
    Rp ${total}
    </p>

    <p>
    <b>Nominal Kesepakatan :</b><br>
    Rp ${Number(kesepakatan).toLocaleString("id-ID")}
    </p>

    <p>
    <b>Biaya Admin :</b><br>
    Rp ${Number(admin).toLocaleString("id-ID")}
    </p>

    `;

    document
    .getElementById("previewData")
    .innerHTML = html;

    document
    .getElementById("previewCard")
    .style.display = "block";

}

</script>

</body>
</html>
