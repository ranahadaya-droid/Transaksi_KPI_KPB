<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Input Transaksi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  margin-bottom:10px;
  border:none;
  background:#1976d2;
  color:white;
  font-size:16px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:5px;
  font-size:12px;
}

</style>

</head>

<body>

<h2>Input Transaksi</h2>

<select id="jenis">
  <option value="">Pilih Jenis</option>
  <option value="Permintaan">Permintaan</option>
  <option value="Reimburse">Reimburse</option>
</select>

<select id="klien">
  <option value="">Pilih Klien</option>
  <option value="KPI">KPI</option>
  <option value="KPB">KPB</option>
</select>

<input id="nama_pengaju" placeholder="Nama Pengaju">

<input id="vendor" placeholder="Vendor">

<label>Tanggal Nota</label>
<input type="date" id="tanggal_nota">

<label>Nama Barang</label>
<input id="nama_barang">

<label>Jumlah Barang</label>
<input type="number" id="jumlah_barang">

<label>Nominal Tagihan</label>
<input type="number" id="nominal_tagihan">

<label>Nominal Kesepakatan</label>
<input type="number" id="nominal_kesepakatan">

<label>Biaya Admin</label>
<input type="number" id="biaya_admin">

<button onclick="simpan()">Simpan</button>

<button onclick="loadData()">Lihat Data</button>

<div id="hasil"></div>

<script>

const supabaseUrl = "ISI_SUPABASE_URL";
const supabaseKey = "ISI_SUPABASE_ANON_KEY";

const supabase =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function simpan(){

  const jenis =
    document.getElementById("jenis").value;

  const tanggalNota =
    document.getElementById("tanggal_nota").value;

  if(
    jenis==="Reimburse" &&
    tanggalNota==""
  ){
    alert(
      "Tanggal Nota wajib untuk Reimburse"
    );
    return;
  }

  const { error } =
  await supabase
  .from("transaksi")
  .insert([{

    jenis:
      document.getElementById("jenis").value,

    klien:
      document.getElementById("klien").value,

    nama_pengaju:
      document.getElementById("nama_pengaju").value,

    vendor:
      document.getElementById("vendor").value,

    tanggal_nota:
      document.getElementById("tanggal_nota").value || null,

    nama_barang:
      document.getElementById("nama_barang").value,

    jumlah_barang:
      document.getElementById("jumlah_barang").value || 0,

    nominal_tagihan:
      document.getElementById("nominal_tagihan").value || 0,

    nominal_kesepakatan:
      document.getElementById("nominal_kesepakatan").value || 0,

    biaya_admin:
      document.getElementById("biaya_admin").value || 0

  }]);

  if(error){
    alert(error.message);
  }else{
    alert("Transaksi berhasil disimpan");
    location.reload();
  }
}

async function loadData(){

  const { data, error } =
  await supabase
  .from('transaksi')
  .select('*')
  .order('id',{ascending:false})
  .limit(20);

  if(error){
    alert(error.message);
    return;
  }

  let html = `
  <table>
  <tr>
    <th>No</th>
    <th>Klien</th>
    <th>Vendor</th>
    <th>Barang</th>
    <th>Tagihan</th>
  </tr>`;

  data.forEach(row=>{

    html += `
    <tr>
      <td>${row.no_transaksi || ''}</td>
      <td>${row.klien || ''}</td>
      <td>${row.vendor || ''}</td>
      <td>${row.nama_barang || ''}</td>
      <td>${Number(row.nominal_tagihan || 0).toLocaleString()}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("hasil").innerHTML =
  html;
}

</script>

</body>
</html>
