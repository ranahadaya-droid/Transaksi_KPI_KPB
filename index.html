<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pengajuan Pembayaran V3</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:15px;
    background:#f5f5f5;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    color:#fff;
    cursor:pointer;
    margin-top:10px;
}

.btn-blue{
    background:#1976d2;
}

.btn-green{
    background:#2e7d32;
}

.btn-red{
    background:#c62828;
}

.item{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
    background:#fafafa;
}

.total{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#1976d2;
}

</style>

</head>

<body>

<div class="card">

<h2>Header Pengajuan</h2>

<label>Jenis</label> <select id="jenis"> <option value="">Pilih Jenis</option> <option value="Permintaan">Permintaan</option> <option value="Reimburse">Reimburse</option> </select>

<label>Klien</label> <select id="klien"> <option value="">Pilih Klien</option> <option value="KPI">KPI</option> <option value="KPB">KPB</option> </select>

<label>Nama Pengaju</label> <input type="text" id="nama_pengaju">

<label>Keperluan</label>

<textarea id="keperluan"></textarea>

<label>Nomor Rekening</label> <input type="text" id="nomor_rekening">

<label>Nama Bank</label> <select id="nama_bank"> <option value="">Pilih Bank</option> <option>MANDIRI</option> <option>BCA</option> <option>BNI</option> <option>BRI</option> <option>CIMB NIAGA</option> <option>BANK LAIN</option> </select>

<label>Atas Nama</label> <input type="text" id="atas_nama">

</div>

<div class="card">

<h2>Detail Pengajuan</h2>

<div id="detailContainer"></div>

<button
type="button"
class="btn-green"
onclick="tambahItem()">

* Tambah Item

  </button>

</div>

<div class="card">

<h2>Total Tagihan Vendor</h2>

<div class="total">
Rp <span id="grandTotal">0</span>
</div>

</div>

<script>

let counter = 0;

function tambahItem(){

    counter++;

    const html = `

    <div class="item" id="item_${counter}">

        <label>Tanggal Nota</label>
        <input type="date" class="tanggal_nota">

        <label>Vendor</label>
        <input type="text" class="vendor">

        <label>Nama Barang</label>
        <input type="text" class="nama_barang">

        <label>Qty</label>
        <input type="number" class="qty">

        <label>Satuan</label>
        <input type="text" class="satuan">

        <label>Nominal Tagihan</label>
        <input
        type="number"
        class="nominal_tagihan"
        oninput="hitungTotal()">

        <label>Keterangan</label>
        <textarea class="keterangan"></textarea>

    <button
    type="button"
    class="btn-red"
    onclick="hapusItem(${counter})">
    Hapus Item
    </button>

</div>

`;

document
.getElementById("detailContainer")
.insertAdjacentHTML(
    "beforeend",
    html
);
```

}

function hapusItem(id){

```
const el =
document.getElementById(
    "item_"+id
);

if(el){
    el.remove();
}

hitungTotal();
```

}

function hitungTotal(){

```
let total = 0;

document
.querySelectorAll(".nominal_tagihan")
.forEach(x=>{

    total +=
    Number(x.value || 0);

});

document
.getElementById("grandTotal")
.innerText =
total.toLocaleString(
    "id-ID"
);
```

}

tambahItem();

</script>

</body>
</html>
