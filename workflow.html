<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Payment Workflow</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#eef3f8;
font-family:Segoe UI,Arial,sans-serif;
color:#333;
padding:20px;

}

.container{

max-width:900px;
margin:auto;

}

.card{

background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.10);

}

.header{

background:linear-gradient(135deg,#1565c0,#1976d2);
padding:28px;
text-align:center;
color:#fff;

}

.header h1{

font-size:34px;
letter-spacing:1px;
margin-bottom:8px;

}

.header p{

opacity:.9;
font-size:15px;

}

.content{

padding:30px;

}

.section-title{

font-size:22px;
font-weight:bold;
color:#1565c0;
margin:35px 0 20px;

}

.separator{

height:1px;
background:#ececec;
margin:28px 0;

}

.grid2{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

}

.label{

font-size:13px;
color:#888;
margin-bottom:5px;

}

.value{

font-size:18px;
font-weight:600;
color:#222;

}

.vendor-list{

display:flex;
flex-direction:column;
gap:15px;

}

.vendor-card{

background:#fafafa;
border-left:5px solid #1976d2;
padding:18px;
border-radius:10px;

}

.vendor-title{

font-size:18px;
font-weight:bold;
color:#1565c0;
margin-bottom:10px;

}

.vendor-item{

padding-left:12px;
margin:8px 0;
line-height:1.6;

}

.vendor-total{

margin-top:12px;
padding-top:12px;
border-top:1px dashed #ddd;
text-align:right;
font-weight:bold;
color:#1565c0;

}

.summary{

background:#f7f9fc;
padding:20px;
border-radius:12px;

}

.summary-row{

display:flex;
justify-content:space-between;
align-items:center;
margin:12px 0;

}

.summary-row span{

color:#666;

}

.summary-row b{

color:#1565c0;

}

.summary-total{

margin-top:18px;
padding-top:18px;
border-top:1px solid #ddd;
font-size:22px;

}

.summary-total b{

color:#2e7d32;
font-size:28px;

}

.keperluan{

background:#fafafa;
padding:18px;
border-radius:10px;
line-height:1.7;

}

.status-box{

padding:20px;
border-radius:12px;
text-align:center;

}

.status-belum{

background:#fff8e1;
border:1px solid #ffd54f;
color:#ef6c00;

}

.status-sudah{

background:#e8f5e9;
border:1px solid #81c784;
color:#2e7d32;

}

.activity{

border-left:4px solid #1976d2;
padding-left:15px;
margin-bottom:20px;

}

.activity-date{

font-size:12px;
color:#999;

}

.activity-title{

font-weight:bold;
margin:5px 0;

}

.activity-desc{

line-height:1.6;
color:#444;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-top:20px;
background:#2e7d32;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;

}

button:hover{

background:#1b5e20;

}

button:disabled{

background:#bdbdbd;
cursor:not-allowed;

}

.success{

display:none;
margin-top:18px;
padding:15px;
background:#e8f5e9;
border-radius:10px;
color:#2e7d32;

}

.error{

display:none;
margin-top:18px;
padding:15px;
background:#ffebee;
border-radius:10px;
color:#c62828;

}

.loading{

padding:20px;
text-align:center;
color:#777;

}

@media(max-width:768px){

body{

padding:10px;

}

.content{

padding:18px;

}

.grid2{

grid-template-columns:1fr;

}

.header h1{

font-size:26px;

}

.summary-total{

font-size:18px;

}

.summary-total b{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<h1>PAYMENT WORKFLOW</h1>

<p id="workflowTitle">

Memuat data...

</p>

</div>

<div class="content">

<!-- HEADER -->

<div>

<div class="label">

No Pengajuan

</div>

<div
id="no_pengajuan"
class="value">

-

</div>

</div>

<div
class="grid2"
style="margin-top:20px;">

<div>

<div class="label">

Jenis

</div>

<div
id="jenis"
class="value">

-

</div>

</div>

<div>

<div class="label">

Klien

</div>

<div
id="klien"
class="value">

-

</div>

</div>

</div>

<div class="separator"></div>

<!-- DETAIL -->

<div class="section-title">

DETAIL PENGAJUAN

</div>

<div
id="detailVendor"
class="vendor-list">

<div class="loading">

Memuat data...

</div>

</div>

<div class="separator"></div>

<!-- SUMMARY -->

<div class="summary">

<div class="summary-row">

<span>Total Vendor</span>

<b id="totalVendor">

Rp0

</b>

</div>

<div class="summary-row">

<span>Biaya Admin</span>

<b id="biayaAdmin">

Rp0

</b>

</div>

<div class="summary-row summary-total">

<span>Total Tagihan Klien</span>

<b id="totalTagihan">

Rp0

</b>

</div>

</div>

<div class="separator"></div>

<!-- REKENING -->

<div class="section-title">

INFORMASI REKENING

</div>

<div class="grid2">

<div>

<div class="label">

Bank

</div>

<div
id="nama_bank"
class="value">

-

</div>

</div>

<div>

<div class="label">

No Rekening

</div>

<div
id="nomor_rekening"
class="value">

-

</div>

</div>

</div>

<div style="margin-top:20px;">

<div class="label">

Atas Nama

</div>

<div
id="atas_nama"
class="value">

-

</div>

</div>

<div class="separator"></div>

<!-- KEPERLUAN -->

<div class="section-title">

KEPERLUAN

</div>

<div
id="keperluan"
class="keperluan">

-

</div>

<div class="separator"></div>

<!-- STATUS -->

<div class="section-title">

STATUS

</div>

<div
id="statusArea">

<div class="loading">

Memuat status...

</div>

</div>

<button
id="btnUpdate">

UPDATE STATUS

</button>

<div
id="success"
class="success">

</div>

<div
id="error"
class="error">

</div>

<div class="separator"></div>

<!-- ACTIVITY -->

<div class="section-title">

AKTIVITAS

</div>

<div
id="activityArea">

<div class="loading">

Memuat aktivitas...

</div>

</div>

</div>

</div>

</div>

<script>

// ======================================
// SUPABASE
// ======================================

const sb = window.supabase.createClient(
    "https://dwfkjlcmjnbhuieqkpkl.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3ZmtqbGNtam5iaHVpZXFrcGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjY3ODksImV4cCI6MjA5Nzk0Mjc4OX0.QjjXjImFkFpUWaAY-uMdX5gNi7k8xUl11YGlBe0CVsQ"
);

// ======================================
// URL PARAMETER
// ======================================

const params = new URLSearchParams(window.location.search);

const type = params.get("type");

const token = params.get("token");

if(!type || !token){

    document.getElementById("error").style.display="block";

    document.getElementById("error").innerHTML=
    "Link tidak valid.";

    throw new Error("Parameter URL tidak ditemukan.");

}

// ======================================
// GLOBAL
// ======================================

let headerData = null;

let detailData = [];

// ======================================
// LOAD DATA
// ======================================

async function loadData(){

    try{

        let query =
        sb
        .from("pengajuan_header")
        .select("*");

        if(type==="finance"){

            query =
            query.eq(
                "token_finance",
                token
            );

        }else{

            query =
            query.eq(
                "token_tagihan",
                token
            );

        }

        const {
            data,
            error
        } =
        await query.maybeSingle();

        if(error) throw error;

        if(!data){

            throw new Error(
                "Data pengajuan tidak ditemukan."
            );

        }

        headerData = data;

        console.log("HEADER",headerData);

        renderHeader();

        await loadDetail();

        renderStatus();

        renderActivity();

    }

    catch(err){

        console.error(err);

        document
        .getElementById("error")
        .style.display="block";

        document
        .getElementById("error")
        .innerHTML=
        err.message;

        document
        .getElementById("btnUpdate")
        .style.display="none";

    }

}

    // ======================================
// HEADER
// ======================================

function renderHeader(){

    document.getElementById("workflowTitle").innerHTML =
    headerData.no_pengajuan;

    document.getElementById("no_pengajuan").innerHTML =
    headerData.no_pengajuan;

    document.getElementById("jenis").innerHTML =
    headerData.jenis;

    document.getElementById("klien").innerHTML =
    headerData.klien;

    document.getElementById("nama_bank").innerHTML =
    headerData.nama_bank;

    document.getElementById("nomor_rekening").innerHTML =
    headerData.nomor_rekening;

    document.getElementById("atas_nama").innerHTML =
    headerData.atas_nama;

    document.getElementById("keperluan").innerHTML =
    headerData.keperluan;

}

    // ======================================
// DETAIL
// ======================================

async function loadDetail(){

    const {
        data,
        error
    } =
    await sb
    .from("pengajuan_detail")
    .select("*")
    .eq(
        "header_id",
        headerData.id
    )
    .order(
        "id",
        {
            ascending:true
        }
    );

    if(error){

        console.error(error);

        document
        .getElementById("detailVendor")
        .innerHTML=
        "<div class='loading'>Gagal mengambil detail.</div>";

        return;

    }

    detailData = data;

    renderDetail();

}

// ======================================
// RENDER DETAIL
// ======================================

function renderDetail(){

    let vendorMap = {};
    let totalVendor = 0;

    detailData.forEach(item=>{

        if(!vendorMap[item.vendor]){

            vendorMap[item.vendor]={
                items:[],
                total:0
            };

        }

        vendorMap[item.vendor].items.push(item);

        vendorMap[item.vendor].total += Number(item.nominal_tagihan);

        totalVendor += Number(item.nominal_tagihan);

    });

    let html="";
    let no=1;

    Object.keys(vendorMap).forEach(vendor=>{

        html+=`
        <div class="vendor-card">

            <div class="vendor-title">

                ${no}. ${vendor}

            </div>
        `;

        vendorMap[vendor].items.forEach(item=>{

            html+=`

            <div class="vendor-item">

                • ${item.nama_barang}

                (${item.qty} ${item.satuan})

                <br>

                Rp ${Number(item.nominal_tagihan).toLocaleString("id-ID")}

            </div>

            `;

        });

        html+=`

            <div class="vendor-total">

                Total :

                Rp ${vendorMap[vendor].total.toLocaleString("id-ID")}

            </div>

        </div>

        `;

        no++;

    });

    if(html===""){

        html="<div class='loading'>Belum ada detail pengajuan.</div>";

    }

    document.getElementById("detailVendor").innerHTML=html;

    const admin = Number(headerData.biaya_admin || 0);

    document.getElementById("totalVendor").innerHTML =
    "Rp "+totalVendor.toLocaleString("id-ID");

    document.getElementById("biayaAdmin").innerHTML =
    "Rp "+admin.toLocaleString("id-ID");

    document.getElementById("totalTagihan").innerHTML =
    "Rp "+(totalVendor+admin).toLocaleString("id-ID");

}

// ======================================
// STATUS
// ======================================

function renderStatus(){

    const status =
    type==="finance"
    ?
    headerData.status_finance
    :
    headerData.status_tagihan;

    const tanggal =
    type==="finance"
    ?
    headerData.tanggal_bayar
    :
    headerData.tanggal_tagih;

    if(status==="SUDAH"){

        document.getElementById("statusArea").innerHTML=`

        <div class="status-box status-sudah">

            <h3>✅ SELESAI</h3>

            <br>

            Tanggal :

            ${formatTanggal(tanggal)}

            <br><br>

            Status telah dikunci.

        </div>

        `;

        document.getElementById("btnUpdate").style.display="none";

    }

    else{

        document.getElementById("statusArea").innerHTML=`

        <div class="status-box status-belum">

            <label>

                <input
                type="radio"
                name="status"
                value="SUDAH">

                ${
                    type==="finance"
                    ?
                    "Sudah Dibayar"
                    :
                    "Sudah Ditagihkan"
                }

            </label>

        </div>

        `;

    }

}

// ======================================
// UPDATE STATUS
// ======================================

async function updateStatus(){

    const radio =
    document.querySelector(
        'input[name="status"]:checked'
    );

    if(!radio){

        alert("Silakan pilih status.");

        return;

    }

    let updateData={};

    if(type==="finance"){

        updateData={

            status_finance:"SUDAH",

            tanggal_bayar:
            new Date().toISOString().substring(0,10)

        };

    }else{

        updateData={

            status_tagihan:"SUDAH",

            tanggal_tagih:
            new Date().toISOString().substring(0,10)

        };

    }

    const {

        data,

        error

    } =
    await sb
    .from("pengajuan_header")
    .update(updateData)
    .eq("id",headerData.id)
    .select();

    if(error){

        alert(error.message);

        return;

    }

    if(data.length===0){

        alert("Data tidak berhasil diperbarui.");

        return;

    }

    alert("Status berhasil diperbarui.");

    location.reload();

}

document
.getElementById("btnUpdate")
.onclick=updateStatus;

// ======================================
// ACTIVITY
// ======================================

function renderActivity(){

    let html=`

    <div class="activity">

        <div class="activity-date">

            ${formatTanggal(headerData.created_at)}

        </div>

        <div class="activity-title">

            Pengajuan Dibuat

        </div>

        <div class="activity-desc">

            ${headerData.no_pengajuan}

        </div>

    </div>

    `;

    if(headerData.status_finance==="SUDAH"){

        html+=`

        <div class="activity">

            <div class="activity-date">

                ${formatTanggal(headerData.tanggal_bayar)}

            </div>

            <div class="activity-title">

                Pembayaran

            </div>

            <div class="activity-desc">

                Finance telah melakukan pembayaran.

            </div>

        </div>

        `;

    }

    if(headerData.status_tagihan==="SUDAH"){

        html+=`

        <div class="activity">

            <div class="activity-date">

                ${formatTanggal(headerData.tanggal_tagih)}

            </div>

            <div class="activity-title">

                Penagihan

            </div>

            <div class="activity-desc">

                Tagihan telah dikirim ke klien.

            </div>

        </div>

        `;

    }

    document.getElementById("activityArea").innerHTML=html;

}

// ======================================
// FORMAT TANGGAL
// ======================================

function formatTanggal(tanggal){

    if(!tanggal) return "-";

    return new Date(tanggal)
    .toLocaleDateString(
        "id-ID",
        {
            day:"2-digit",
            month:"long",
            year:"numeric"
        }
    );

}

window.onload=()=>{

    loadData();

};

</script>

</body>
</html>
