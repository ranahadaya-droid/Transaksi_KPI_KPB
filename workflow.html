<style>

  <script>

const sb =
window.supabase.createClient(

"https://dwfkjlcmjnbhuieqkpkl.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3ZmtqbGNtam5iaHVpZXFrcGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjY3ODksImV4cCI6MjA5Nzk0Mjc4OX0.QjjXjImFkFpUWaAY-uMdX5gNi7k8xUl11YGlBe0CVsQ"

);

const params =
new URLSearchParams(
window.location.search
);

const type =
params.get("type");

const token =
params.get("token");

      async function loadData(){

    let query =
    sb
    .from("pengajuan_header")
    .select("*");

    if(type=="finance"){

        query =
        query.eq(
            "token_finance",
            token
        );

    }else{

        query =
        query.eq(
            "token_tagihan",
            token
        );

    }

          console.log("TYPE :", type);

console.log("TOKEN :", token);

console.log(query);
          
    const {data,error} =
    await query.single();

    if(error || !data){

        document
        .getElementById("error")
        .style.display="block";

        document
        .getElementById("btnUpdate")
        .style.display="none";

        console.log(error);

        return;

    }

    document.getElementById("no_pengajuan").innerText =
    data.no_pengajuan;

    document.getElementById("jenis").innerText =
    data.jenis;

    document.getElementById("klien").innerText =
    data.klien;

    document.getElementById("atas_nama").innerText =
    data.atas_nama;

    document.getElementById("nama_bank").innerText =
    data.nama_bank;

    document.getElementById("nomor_rekening").innerText =
    data.nomor_rekening;

    document.getElementById("nominal_tagihan").innerText =
    "Rp " +
    Number(data.nominal_tagihan)
    .toLocaleString("id-ID");

          let html = "";

if(type=="finance"){

    if(data.status_finance=="SUDAH"){

        html = `

        <div class="success" style="display:block">

        ✅ Pembayaran sudah dilakukan

        <br><br>

        Tanggal Bayar

        <br>

        ${data.tanggal_bayar}

        </div>

        `;

        document
        .getElementById("btnUpdate")
        .style.display="none";

    }else{

        html = `

        <label>

        <input
        type="radio"
        name="status"
        value="SUDAH">

        Sudah Dibayar

        </label>

        `;

    }

}else{

    if(data.status_tagihan=="SUDAH"){

        html = `

        <div class="success" style="display:block">

        ✅ Sudah Ditagihkan

        <br><br>

        Tanggal Tagih

        <br>

        ${data.tanggal_tagih}

        </div>

        `;

        document
        .getElementById("btnUpdate")
        .style.display="none";

    }else{

        html = `

        <label>

        <input
        type="radio"
        name="status"
        value="SUDAH">

        Sudah Ditagihkan

        </label>

        `;

    }

}

document
.getElementById("statusArea")
.innerHTML = html;

}

loadData();

      async function updateStatus(){

    const radio =
    document.querySelector(
    'input[name="status"]:checked'
    );

    if(!radio){

        alert("Pilih status.");

        return;

    }

          // ============================
// CEK STATUS TERBARU
// ============================

let cek =
sb
.from("pengajuan_header")
.select("*");

if(type=="finance"){

    cek =
    cek.eq(
        "token_finance",
        token
    );

}else{

    cek =
    cek.eq(
        "token_tagihan",
        token
    );

}

const {
data,
error
}
=
await cek.single();

if(error){

    alert(error.message);

    return;

}

          // ============================
// SUDAH PERNAH UPDATE?
// ============================

if(
type=="finance"
&&
data.status_finance=="SUDAH"
){

    alert(
    "Status pembayaran sudah pernah diperbarui."
    );

    return;

}

if(
type=="tagihan"
&&
data.status_tagihan=="SUDAH"
){

    alert(
    "Status penagihan sudah pernah diperbarui."
    );

    return;

}

    let updateData = {};

    if(type=="finance"){

        updateData = {

            status_finance:"SUDAH",

            tanggal_bayar:
            new Date()
            .toISOString()
            .substring(0,10)

        };

    }else{

        updateData = {

            status_tagihan:"SUDAH",

            tanggal_tagih:
            new Date()
            .toISOString()
            .substring(0,10)

        };

    }

    let query =
    sb
    .from("pengajuan_header")
    .update(updateData);

    if(type=="finance"){

    query =
    query
    .eq(
        "token_finance",
        token
    )
    .eq(
        "status_finance",
        "BELUM"
    );

}else{

    query =
    query
    .eq(
        "token_tagihan",
        token
    )
    .eq(
        "status_tagihan",
        "BELUM"
    );

}

    const {error} =
    await query;

    if(error){

        alert(error.message);

        return;

    }

    alert("Status berhasil diperbarui.");

    location.reload();

}

console.log(type);

console.log(token);

</script>
